name: docker-ghcr

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: Force a rebuild even if upstream HEAD is unchanged
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '17 * * * *'

permissions:
  contents: write
  packages: write

concurrency:
  group: docker-ghcr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/inkos-docker
  UPSTREAM_REPO: https://github.com/Narcooo/inkos.git

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine upstream state
        id: upstream
        shell: bash
        run: |
          set -euo pipefail
          DEFAULT_BRANCH=$(git ls-remote --symref "$UPSTREAM_REPO" HEAD | awk '/^ref:/ {sub("refs/heads/", "", $2); print $2; exit}')
          if [[ -z "$DEFAULT_BRANCH" ]]; then
            echo "Failed to determine upstream default branch" >&2
            exit 1
          fi
          CURRENT_HEAD=$(git ls-remote "$UPSTREAM_REPO" "refs/heads/$DEFAULT_BRANCH" | awk '{print $1}')
          if [[ -z "$CURRENT_HEAD" ]]; then
            echo "Failed to determine upstream HEAD for branch $DEFAULT_BRANCH" >&2
            exit 1
          fi
          CURRENT_NPM_VERSION=$(npm view @actalk/inkos dist-tags.latest)
          if [[ -z "$CURRENT_NPM_VERSION" ]]; then
            echo "Failed to determine npm dist-tags.latest for @actalk/inkos" >&2
            exit 1
          fi
          PREVIOUS_HEAD=$(jq -r '.upstream_head // ""' upstream-state.json)
          PREVIOUS_NPM_VERSION=$(jq -r '.npm_version // ""' upstream-state.json)
          SHORT_SHA=${CURRENT_HEAD:0:12}
          FORCE_BUILD="${{ github.event_name == 'workflow_dispatch' && inputs.force_build || false }}"

          if [[ "$FORCE_BUILD" == "true" ]]; then
            SHOULD_BUILD=true
            REASON=manual
          elif [[ "$CURRENT_NPM_VERSION" != "$PREVIOUS_NPM_VERSION" ]]; then
            SHOULD_BUILD=true
            REASON=npm_release_changed
          elif [[ "$CURRENT_HEAD" != "$PREVIOUS_HEAD" ]]; then
            SHOULD_BUILD=true
            REASON=upstream_changed
          else
            SHOULD_BUILD=false
            REASON=no_change
          fi

          echo "default_branch=$DEFAULT_BRANCH" >> "$GITHUB_OUTPUT"
          echo "current_head=$CURRENT_HEAD" >> "$GITHUB_OUTPUT"
          echo "previous_head=$PREVIOUS_HEAD" >> "$GITHUB_OUTPUT"
          echo "inkos_version=$CURRENT_NPM_VERSION" >> "$GITHUB_OUTPUT"
          echo "previous_inkos_version=$PREVIOUS_NPM_VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

      - name: Skip summary
        if: steps.upstream.outputs.should_build != 'true'
        run: |
          echo "No upstream or npm release change detected. Skipping build."
          echo "Current HEAD:        ${{ steps.upstream.outputs.current_head }}"
          echo "Previous HEAD:       ${{ steps.upstream.outputs.previous_head }}"
          echo "Current npm latest:  ${{ steps.upstream.outputs.inkos_version }}"
          echo "Previous npm latest: ${{ steps.upstream.outputs.previous_inkos_version }}"

      - name: Set up QEMU
        if: steps.upstream.outputs.should_build == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: steps.upstream.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build smoke-test image
        if: steps.upstream.outputs.should_build == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: inkos-docker:smoke
          build-args: |
            INKOS_VERSION=${{ steps.upstream.outputs.inkos_version }}
          labels: |
            org.opencontainers.image.title=inkos-docker
            org.opencontainers.image.description=Unofficial InkOS Docker image built from published npm releases
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.upstream.outputs.inkos_version }}
            org.opencontainers.image.revision=${{ steps.upstream.outputs.current_head }}

      - name: Smoke test container runtime
        if: steps.upstream.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cid=$(docker run -d -p 4567:4567 inkos-docker:smoke)
          cleanup() {
            docker logs "$cid" || true
            docker rm -f "$cid" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4567 >/dev/null; then
              echo "Smoke test passed"
              exit 0
            fi
            if ! docker ps --format '{{.ID}}' | grep -q "^${cid:0:12}"; then
              echo "Container exited before becoming ready" >&2
              exit 1
            fi
            sleep 2
          done

          echo "Smoke test timed out waiting for http://127.0.0.1:4567" >&2
          exit 1

      - name: Log in to GHCR
        if: steps.upstream.outputs.should_build == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.upstream.outputs.should_build == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            INKOS_VERSION=${{ steps.upstream.outputs.inkos_version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:npm-${{ steps.upstream.outputs.inkos_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:upstream-${{ steps.upstream.outputs.short_sha }}
          labels: |
            org.opencontainers.image.title=inkos-docker
            org.opencontainers.image.description=Unofficial InkOS Docker image built from published npm releases
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.upstream.outputs.inkos_version }}
            org.opencontainers.image.revision=${{ steps.upstream.outputs.current_head }}

      - name: Update tracked upstream state
        if: steps.upstream.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euo pipefail
          TMP=$(mktemp)
          jq \
            --arg ref "${{ steps.upstream.outputs.current_head }}" \
            --arg npm_version "${{ steps.upstream.outputs.inkos_version }}" \
            --arg built "$(date -u +%FT%TZ)" \
            '.upstream_head=$ref | .npm_version=$npm_version | .last_built_at=$built' \
            upstream-state.json > "$TMP"
          mv "$TMP" upstream-state.json

      - name: Commit tracked state
        if: steps.upstream.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet upstream-state.json; then
            echo "No state changes to commit"
            exit 0
          fi
          git add upstream-state.json
          git commit -m "chore: track InkOS upstream ${{ steps.upstream.outputs.short_sha }} npm ${{ steps.upstream.outputs.inkos_version }} [skip ci]"
          git push
